name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Verify tag is on main
        run: git merge-base --is-ancestor ${{ github.sha }} origin/main

  unit-test:
    needs: guard
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Unit tests
        run: make test

  integration-test:
    needs: guard
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Integration tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        run: make test-integration

  release:
    needs: [unit-test, integration-test]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create and upload DMG
        env:
          VERSION: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          universal=$(find dist -path "*universal*" -name "zee" -type f | head -1)
          test -n "$universal" || { echo "universal binary not found"; find dist -type f; exit 1; }
          chmod +x "$universal"
          packaging/mkdmg.sh "$universal" "$VERSION" "Zee-${VERSION}.dmg"
          shasum -a 256 "Zee-${VERSION}.dmg" >> dist/checksums.txt
          gh release upload "$VERSION" "Zee-${VERSION}.dmg" dist/checksums.txt --clobber
