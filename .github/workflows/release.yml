name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag is on main
        run: git merge-base --is-ancestor ${{ github.sha }} origin/main

  release:
    needs: guard
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.ZEE_RELEASE_TOKEN }}

      - name: Create and upload DMG
        env:
          VERSION: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.ZEE_RELEASE_TOKEN }}
        run: |
          universal=$(find dist -name "zee_all" -type d)/zee
          chmod +x "$universal"
          packaging/mkdmg.sh "$universal" "$VERSION" "Zee-${VERSION}.dmg"
          shasum -a 256 "Zee-${VERSION}.dmg" >> dist/checksums.txt
          gh release upload "$VERSION" "Zee-${VERSION}.dmg" --clobber
