version: 2

before:
  hooks:
    - packaging/mkicns.sh packaging/appicon.png

builds:
  - id: zee
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

universal_binaries:
  - id: zee-universal
    ids:
      - zee
    replace: false

archives:
  - builds:
      - zee
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: sumerc
    name: zee
